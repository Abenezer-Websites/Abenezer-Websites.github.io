<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#182232" />
    </linearGradient>

    <!-- Electric Cyan Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Flame Coral Accent -->
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4b2b" />
      <stop offset="100%" stop-color="#ff416c" />
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#00f2fe" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer Dark Badge -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGrad)" />
  <circle cx="256" cy="256" r="228" fill="none" stroke="url(#cyanGrad)" stroke-width="3" stroke-opacity="0.3" />

  <!-- Monogram Emblem -->
  <g filter="url(#glow)">
    <!-- Left Wing -->
    <path d="M 256 120 L 140 370 L 195 370 L 256 220 Z" fill="url(#cyanGrad)" />

    <!-- Right Wing -->
    <path d="M 256 120 L 372 370 L 317 370 L 256 220 Z" fill="url(#cyanGrad)" />

    <!-- Accent Crossbar -->
    <path d="M 185 270 L 327 270 L 312 300 L 200 300 Z" fill="url(#flameGrad)" />

    <!-- Apex Diamond -->
    <polygon points="256,90 275,130 256,170 237,130" fill="#FFFFFF" />
  </g>
</svg>
